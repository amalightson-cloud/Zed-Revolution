workflows:
  ios-release:
      name: Zed Revolution iOS Release
          max_build_duration: 120
              instance_type: mac_mini_m1
                  integrations:
                        app_store_connect: Zed Revolution App Store
                            environment:
                                  ios_signing:
                                          distribution_type: app_store
                                                  bundle_identifier: com.zedrevolution.game
                                                        vars:
                                                                BUNDLE_ID: "com.zedrevolution.game"
                                                                        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
                                                                                XCODE_SCHEME: "App"
                                                                                    scripts:
                                                                                          - name: Install dependencies
                                                                                                  script: npm install
                                                                                                        - name: Build web assets
                                                                                                                script: npm run build
                                                                                                                      - name: Capacitor sync
                                                                                                                              script: npx cap sync ios
                                                                                                                                    - name: Install CocoaPods
                                                                                                                                            script: |
                                                                                                                                                      cd ios/App
                                                                                                                                                                pod install
                                                                                                                                                                      - name: Build iOS
                                                                                                                                                                              script: |
                                                                                                                                                                                        xcode-project use-profiles
                                                                                                                                                                                                  xcode-project build-ipa \
                                                                                                                                                                                                              --workspace "$XCODE_WORKSPACE" \
                                                                                                                                                                                                                          --scheme "$XCODE_SCHEME"
                                                                                                                                                                                                                              artifacts:
                                                                                                                                                                                                                                    - build/ios/ipa/*.ipa
                                                                                                                                                                                                                                          - /tmp/xcodebuild_logs/*.log
                                                                                                                                                                                                                                              publishing:
                                                                                                                                                                                                                                                    app_store_connect:
                                                                                                                                                                                                                                                            auth: integration
                                                                                                                                                                                                                                                                    submit_to_testflight: true
